name: SPFx Heft CI-CD Lifecycle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-solution:
    name: Checkout and Build SPFx (Heft)
    runs-on: ubuntu-latest
    outputs:
      package-name: ${{ steps.get-package.outputs.name }}

    steps:
      # Step 1: Clone the repository onto the GitHub runner
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Establish correct Node version environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.23.0'
          cache: 'npm'

      # Step 3: Perform clean, locked-down installation of dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run Heft build task lifecycle (compiling, linting, tests)
      - name: Execute Heft Clean and Build
        run: |
          npx heft clean
          npx heft build --production

      # Step 5: Bundle for production package delivery
      - name: Package Solution
        run: npx heft package-solution --production

      # Step 6: Securely isolate the compiled .sppkg package as a pipeline artifact
      - name: Upload Build Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spfx-sppkg-package
          path: sharepoint/solution/*.sppkg
          retention-days: 7

      # Step 7: Identify the package filename dynamically for the deployment job
      - name: Identify Package Filename
        id: get-package
        run: |
          filename=$(basename $(ls sharepoint/solution/*.sppkg))
          echo "name=$filename" >> $GITHUB_OUTPUT

  deploy-solution:
    name: Deploy to SharePoint App Catalog
    runs-on: ubuntu-latest
    needs: build-solution
    # Ensures deployment ONLY triggers on commits/merges directly to the main branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Step 1: Fetch the compiled package from the build job stage
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: spfx-sppkg-package
          path: drop/

      # Step 2: Install PnP PowerShell and deploy the package directly from the workflow
      - name: Authenticate and Deploy via PnP PowerShell
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PnP.PowerShell -Scope CurrentUser -Force -AllowClobber -ErrorAction Stop
          Import-Module PnP.PowerShell

          $certPath = Join-Path $PWD 'github-auth-cert.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.SPFX_PER_BASE64_CERTIFICATE }}"))

          $conn = Connect-PnPOnline -Url "${{ vars.SPFX_TARGET_SITE_URL }}" `
            -ClientId "${{ vars.SPFX_CLIENT_ID }}" `
            -Tenant "${{ vars.SPFX_TENANT_ID }}" `
            -CertificatePath $certPath `
            -CertificatePassword (ConvertTo-SecureString "${{ secrets.SPFX_CERTIFICATE_PASSWORD }}" -AsPlainText -Force) `
            -ReturnConnection

          Write-Host "Connected successfully to site collection: ${{ vars.SPFX_TARGET_SITE_URL }}"

          Add-PnPApp -Path "drop/${{ needs.build-solution.outputs.package-name }}" -Scope Site -Overwrite
          Publish-PnPApp -Identity "${{ needs.build-solution.outputs.package-name }}" -Scope Site

          Write-Host "Deployment completed successfully!"